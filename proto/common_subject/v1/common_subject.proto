syntax = "proto3";

package common_subject.v1;

option go_package = "github.com/Talan-Application/proto-generation/common_subject/v1;commonsubjectv1";

service CommonSubjectService {
  rpc CreateCommonSubject(CreateCommonSubjectRequest)   returns (CommonSubjectResponse);
  rpc GetCommonSubject(GetCommonSubjectRequest)         returns (CommonSubjectResponse);
  rpc GetAllCommonSubjects(GetAllCommonSubjectsRequest) returns (GetAllCommonSubjectsResponse);
  rpc UpdateCommonSubject(UpdateCommonSubjectRequest)   returns (CommonSubjectResponse);
  rpc DeleteCommonSubject(DeleteCommonSubjectRequest)   returns (DeleteCommonSubjectResponse);
}

message CreateCommonSubjectRequest {
  map<string, string> translations = 1;
}

message UpdateCommonSubjectRequest {
  int64               id           = 1;
  map<string, string> translations = 2;
}

message GetCommonSubjectRequest {
  int64 id = 1;
}

message GetAllCommonSubjectsRequest {
  optional int32 limit  = 1;
  optional int32 offset = 2;
}

message DeleteCommonSubjectRequest {
  int64 id = 1;
}

message CommonSubjectResponse {
  int64  id         = 1;
  string name       = 2;
  int64  created_at = 4;
  int64  updated_at = 5;
}

message GetAllCommonSubjectsResponse {
  repeated CommonSubjectResponse common_subjects = 1;
}

message DeleteCommonSubjectResponse {
  string message = 1;
}
